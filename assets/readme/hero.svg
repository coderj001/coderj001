    <text x="52" y="87" fill="#FAFAF9" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16">shipping full-stack work</text>
    <circle cx="34" cy="116" r="5" fill="#2563EB"/>
    <text x="52" y="121" fill="#FAFAF9" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16">learning cloud architecture</text>
