<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">Raju Ghorai, full-stack developer and DevOps engineer</title>
  <desc id="desc">A terminal-inspired profile header showing Raju Ghorai building reliable software and open-source tools.</desc>

  <rect width="1200" height="360" rx="24" fill="#101114"/>
