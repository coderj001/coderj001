  <text x="112" y="48" fill="#A1A1AA" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16">~/coderj001/profile</text>

  <g transform="translate(64 124)">
    <text x="0" y="0" fill="#84CC16" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="17">&gt; whoami</text>
